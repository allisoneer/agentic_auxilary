name: Xtask Sync (release PR)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  readme-sync:
    name: Sync xtask-managed generated files
    runs-on: ubuntu-latest
    # Only run on same-repo PRs labeled "release"
    if: ${{ github.event_name == 'pull_request' && contains(toJson(github.event.pull_request.labels), '"name":"release"') && github.event.pull_request.head.repo.full_name == github.repository }}
    # Don't block releases if something goes wrong
    continue-on-error: true
    concurrency:
      group: readme-sync-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Generate GitHub token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.93.0
          cache: true

      - name: Sync generated files
        id: sync
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          set -euo pipefail
          cargo run -p xtask -- sync

          changed_files="$(
            {
              git diff --name-only
              git ls-files --others --exclude-standard
            } | sort -u
          )"

          if [ -z "$changed_files" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          allowed_re='^(CLAUDE\.md|README\.md|release-plz\.toml|mise\.toml|justfile|agentic\.schema\.json|apps/.*/CLAUDE\.md|crates/.*/CLAUDE\.md|bindings/.*/CLAUDE\.md)$'
          bad="$(printf '%s\n' "$changed_files" | grep -Ev "$allowed_re" || true)"
          if [ -n "$bad" ]; then
            echo "::error::xtask sync modified unexpected files; refusing to auto-commit"
            echo "$bad"
            exit 1
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        if: steps.sync.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name "xtask-sync[bot]"
          git config user.email "xtask-sync[bot]@users.noreply.github.com"
          changed_files="$(
            {
              git diff --name-only
              git ls-files --others --exclude-standard
            } | sort -u
          )"
          while IFS= read -r path; do
            git add -- "$path"
          done <<< "$changed_files"
          git commit -m "chore(sync): xtask sync [skip ci]"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_HEAD_REF}"
